<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ellah Jane Mortel - Programming Portfolio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* GLOBAL */
* { margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; }
body { font-family:'Inter',sans-serif; background:#0d1117; color:#e6edf3; line-height:1.6; }
.container { max-width:1100px; margin:auto; padding:0 20px; }
section { padding:80px 0; }

/* HEADER - NEW LAYOUT */
header {
    background: linear-gradient(135deg,#0f172a,#020617);
    padding: 100px 0 70px;
    border-bottom: 1px solid #1f2937;
    position: relative;
}

.header-top-title {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.2rem;
    color: #60a5fa;
    font-weight: 600;
    z-index: 10;
    text-align: center;
}

.header-content {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 60px;
    margin-top: 80px;
}

.hero-left {
    flex: 1;
}

.typing-description {
    font-size: 1.4rem;
    color: #60a5fa;
    margin-bottom: 25px;
    min-height: 50px;
    border-right: 3px solid #60a5fa;
    white-space: nowrap;
    overflow: hidden;
    font-weight: 400;
    animation: typing 3.5s steps(40) forwards, blink-caret 0.75s step-end infinite;
}

@keyframes typing {
    from { width: 0; }
    to { width: 100%; }
}

@keyframes blink-caret {
    from, to { border-color: transparent; }
    50% { border-color: #60a5fa; }
}

.contact-info {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.contact-info a {
    color: #e6edf3;
    text-decoration: none;
    background: #111827;
    padding: 10px 16px;
    border-radius: 25px;
    transition: .3s;
    font-size: .95rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.contact-info a:hover {
    background: #2563eb;
    transform: translateY(-3px);
}

.hero-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.profile-photo-container {
    margin-bottom: 25px;
}

.profile-photo {
    width: 220px;
    height: 280px; /* Vertical rectangle */
    border-radius: 24px;
    object-fit: cover;
    border: 5px solid #1f2937;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 
        0 20px 40px rgba(0,0,0,0.4),
        0 10px 20px rgba(0,0,0,0.3),
        inset 0 2px 4px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
}

.profile-photo::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(96,165,250,0.3), transparent);
    transition: left 0.7s;
}

.profile-photo:hover {
    transform: translateY(-15px) scale(1.03);
    border-color: #3b82f6;
    box-shadow: 
        0 40px 80px rgba(59,130,246,0.4),
        0 25px 50px rgba(0,0,0,0.6),
        inset 0 2px 8px rgba(255,255,255,0.2);
}

.profile-photo:hover::before {
    left: 100%;
}

.profile-name {
    font-size: 2.5rem;
    font-weight: 700;
    color: #e6edf3;
    margin: 0;
    letter-spacing: -1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

/* NAV */
nav {
    background: #020617;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #1f2937;
}

nav ul {
    display: flex;
    justify-content: center;
    list-style: none;
    gap: 30px;
    padding: 15px 0;
}

nav a {
    text-decoration: none;
    color: #cbd5f5;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover, nav a.active {
    color: #60a5fa;
}

/* Rest of your existing styles remain EXACTLY the same */
.section-title { font-size:2.3rem; text-align:center; margin-bottom:10px; }
.section-subtitle { text-align:center; color:#9ca3af; margin-bottom:40px; }

.about-content { max-width:700px; margin:auto; text-align:center; color:#cbd5f5; }

.education-card {
    background: linear-gradient(145deg,#0f172a,#020617);
    border-radius: 16px;
    padding: 40px;
    margin-top: 40px;
    box-shadow: 0 10px 40px rgba(0,0,0,.6);
}

.education-title {
    font-size: 2rem;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.education-timeline {
    position: relative;
    margin-left: 20px;
}

.education-timeline::before {
    content: "";
    position: absolute;
    left: -2px;
    top: 0;
    width: 2px;
    height: 100%;
    background: #3b82f6;
}

.education-item {
    margin-bottom: 30px;
    position: relative;
    padding-left: 30px;
}

.education-item::before {
    content: "";
    position: absolute;
    left: -9px;
    top: 6px;
    width: 14px;
    height: 14px;
    background: #3b82f6;
    border-radius: 50%;
}

.education-item h3 { color: #60a5fa; margin-bottom: 5px; }
.education-item p { color: #9ca3af; }

.task-category { margin-top: 40px; }
.category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
.category-title { font-size: 1.4rem; color: #60a5fa; }

.tasks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
    gap: 25px;
}

.task-card {
    background: #111827;
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #1f2937;
    transition: 0.3s;
    position: relative;
}

.task-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.task-card.midterm { border-left: 4px solid #3b82f6; }

.task-number {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 2rem;
    font-weight: 700;
    color: #1f2937;
}

.task-title { margin-bottom: 10px; color: #60a5fa; }
.task-description { font-size: .95rem; margin-bottom: 20px; color: #9ca3af; }

.task-buttons { display: flex; flex-direction: column; gap: 12px; }

.file-section {
    background: #020617;
    padding: 12px;
    border-radius: 8px;
    font-size: .85rem;
    border: 1px solid #1f2937;
}

.file-section.pdf { border-left: 4px solid #ef4444; }

.btn {
    display: inline-block;
    margin-top: 6px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: .85rem;
    text-decoration: none;
    transition: 0.3s;
}

.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
.btn-pdf { background: #ef4444; color: white; }
.btn-pdf:hover { background: #dc2626; transform: translateY(-2px); }

/* PDF MODAL */
.pdf-modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
}

.pdf-modal-content {
    position: relative;
    width: 90%;
    height: 90%;
    margin: 2% auto;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
}

.close {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.close:hover { color: #ef4444; }

.pdf-container { width: 100%; height: 100%; border: none; }

footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid #1f2937;
    color: #9ca3af;
}

/* MOBILE */
@media(max-width:768px) {
    .header-content {
        flex-direction: column;
        text-align: center;
        gap: 40px;
        margin-top: 120px;
    }
    
    .header-top-title {
        position: static;
        transform: none;
        margin-bottom: 20px;
        font-size: 1.8rem;
    }
    
    .profile-photo {
        width: 180px;
        height: 230px;
    }
    
    .profile-name {
        font-size: 2rem;
    }
    
    nav ul { flex-direction: column; gap: 15px; }
}
</style>
</head>

<body>
<header id="home">
    <div class="container">
        <!-- MAIN TITLE ABOVE EVERYTHING -->
        <h1 class="header-top-title">Programming Tasks Portfolio</h1>
        
        <!-- LEFT: Typing Description + Contacts | RIGHT: Photo + Name UNDER Photo -->
        <div class="header-content">
            <div class="hero-left">
                <!-- TYPING DESCRIPTION (aligned with photo level) -->
                <p class="typing-description" data-text="Excel Data Cleaning & Analysis Specialist | Skilled in data organization, inconsistency correction, and Excel formula mastery for accurate analysis and reporting.">Excel Data Cleaning & Analysis Specialist</p>
                
                <!-- CONTACTS BELOW DESCRIPTION -->
                <div class="contact-info">
                    <a href="mailto:ellahjanemortel@gmail.com"><i class="fa-solid fa-envelope"></i> Email</a>
                    <a href="tel:+639750952032"><i class="fa-solid fa-phone"></i> Phone</a>
                </div>
            </div>

            <div class="hero-right">
                <!-- VERTICAL RECTANGLE PHOTO -->
                <div class="profile-photo-container">
                    <img src="https://images.unsplash.com/photo-1494790108755-2616b612b786?w=400" class="profile-photo" alt="Ellah Jane Mortel">
                </div>
                
                <!-- NAME UNDER PHOTO -->
                <h1 class="profile-name">Ellah Jane Mortel</h1>
            </div>
        </div>
    </div>
</header>

<!-- Your existing navigation and sections remain exactly the same -->
<nav>
<div class="container">
<ul>
<li><a href="#home" class="active" onclick="triggerTyping()">Home</a></li>
<li><a href="#about">About</a></li>
<li><a href="#education">Education</a></li>
<li><a href="#practice-tasks">Practice Tasks</a></li>
<li><a href="#midterm-tasks">Midterm Tasks</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</div>
</nav>

<!-- All your other sections remain IDENTICAL -->
<!-- ... (about, education, practice-tasks, midterm-tasks, contact, footer, scripts) ... -->

<script>
// Your existing PDF functions + NEW typing trigger
function openPDF(pdfPath) {
    const modal = document.getElementById("pdfModal");
    const viewer = document.getElementById("pdfViewer");
    viewer.src = pdfPath;
    modal.style.display = "block";
    document.body.style.overflow = "hidden";
}

function closePDF() {
    const modal = document.getElementById("pdfModal");
    const viewer = document.getElementById("pdfViewer");
    modal.style.display = "none";
    viewer.src = "";
    document.body.style.overflow = "auto";
}

function triggerTyping() {
    const typingElement = document.querySelector('.typing-description');
    const originalText = typingElement.getAttribute('data-text');
    
    typingElement.style.animation = 'none';
    typingElement.style.borderRightColor = 'transparent';
    typingElement.textContent = '';
    typingElement.offsetHeight;
    
    typingElement.textContent = originalText;
    typingElement.style.animation = 'typing 3s steps(40) forwards, blink-caret 0.75s step-end infinite';
}

// Navigation + Typing trigger
document.querySelectorAll('nav a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function() {
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        this.classList.add('active');
        if(this.getAttribute('href') === '#home') triggerTyping();
    });
});

// Auto-trigger on load
window.addEventListener('load', triggerTyping);

// Modal outside click
window.onclick = function(event) {
    if(event.target.id === "pdfModal") closePDF();
}
</script>
</body>
</html>
